name: Deploy Python Environment (Diff Patch)

on:
  push:
    tags:
      - 'env-v*'
  workflow_dispatch:

jobs:
  build-python-env:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      ARTIFACT_DIR: out

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Detect Changed Modules
        id: changed
        shell: powershell
        run: |
          git fetch --force --tags
          $currentTag = $env:GITHUB_REF_NAME
          $previousTag = git tag --list 'env-v*' --sort=-version:refname | Where-Object { $_ -ne $currentTag } | Select-Object -First 1

          $speechChanged = $true
          $hailoChanged = $true
          if ($previousTag) {
            $changedFiles = @(git diff --name-only "$previousTag..$currentTag")
            $speechChanged = @($changedFiles | Where-Object {
              $_ -match '^(models/whisper-small-int8-ov/|scripts/prepare-speech-assets\.ps1$|scripts/package-split-runtime\.ps1$)'
            }).Count -gt 0
            $hailoChanged = @($changedFiles | Where-Object {
              $_ -match '^(models/.*\.hef$|scripts/package-hailo-addon\.ps1$)'
            }).Count -gt 0
          }

          "PREVIOUS_TAG=$previousTag" >> $env:GITHUB_ENV
          "SPEECH_ASSETS_CHANGED=$($speechChanged.ToString().ToLower())" >> $env:GITHUB_ENV
          "HAILO_ASSET_CHANGED=$($hailoChanged.ToString().ToLower())" >> $env:GITHUB_ENV

      - name: Download Reusable Build Assets
        if: env.SPEECH_ASSETS_CHANGED == 'false' && env.PREVIOUS_TAG != ''
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $headers = @{ Authorization = "Bearer $env:GH_TOKEN"; 'User-Agent' = 'GitHubActions' }
          $release = Invoke-RestMethod -Headers $headers -Uri "https://api.github.com/repos/${{ github.repository }}/releases/tags/$env:PREVIOUS_TAG"
          $assetNames = @("stt-assets.zip", "tts-core-assets.zip")

          foreach ($assetName in $assetNames) {
            $asset = $release.assets | Where-Object { $_.name -eq $assetName } | Select-Object -First 1
            if (-not $asset) {
              Write-Error "Missing reusable build asset '$assetName' in release $env:PREVIOUS_TAG"
              exit 1
            }
            Invoke-WebRequest -Headers $headers -Uri $asset.browser_download_url -OutFile $assetName
          }
      
      # 1. HDiffPatch Tool Setup

      - name: Download HDiffPatch Tool
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $headers = @{ Authorization = "Bearer $env:GH_TOKEN" }
          $apiUrl = "https://api.github.com/repos/sisong/HDiffPatch/releases"
          
          try {
              $releases = Invoke-RestMethod -Uri $apiUrl -Headers $headers
          } catch {
              Write-Error "Failed to fetch releases list: $_"
              exit 1
          }

          $targetAsset = $null
          $targetTag = ""

          foreach ($release in $releases) {
              $found = $release.assets | Where-Object { $_.name -like "*windows*.zip" -or $_.name -like "*win64*.zip" } | Select-Object -First 1
              if ($found) {
                  $targetAsset = $found
                  $targetTag = $release.tag_name
                  break 
              }
          }
          
          if ($null -eq $targetAsset) {
              Write-Error "FATAL: Could not find any windows asset in recent HDiffPatch releases."
              exit 1
          }

          $downloadUrl = $targetAsset.browser_download_url
          Invoke-WebRequest -Uri $downloadUrl -OutFile "hdiff_tool.zip"
          Expand-Archive -Path "hdiff_tool.zip" -DestinationPath "hdiff_tools" -Force
          Get-ChildItem -Path "hdiff_tools" -Recurse -Filter "hdiffz.exe" | Copy-Item -Destination . -Force
          Get-ChildItem -Path "hdiff_tools" -Recurse -Filter "hpatchz.exe" | Copy-Item -Destination . -Force

      - name: Cache Pip Packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/pip
            wheelhouse
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 2. Build Python Environment
      - name: Build Pure Isolated Python
        shell: powershell
        run: |
          $buildArgs = @()
          if (($env:SPEECH_ASSETS_CHANGED -eq 'false') -and (Test-Path "stt-assets.zip") -and (Test-Path "tts-core-assets.zip")) {
            $buildArgs += "-ReuseSttAssetZip"; $buildArgs += "stt-assets.zip"
            $buildArgs += "-ReuseTtsCoreAssetZip"; $buildArgs += "tts-core-assets.zip"
          }
          .\scripts\build-python-env.ps1 @buildArgs

      # 3. Full Zip & Manifest
      - name: Setup Node.js for Manifest
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Generate Manifest
        run: node scripts/generate_manifest.js

      - name: Zip NEW Full Environment
        run: 7z a -mx=9 python-env-full.zip python-env

      - name: Package Split Runtime
        shell: powershell
        run: |
          $packageArgs = @()
          if ($env:SPEECH_ASSETS_CHANGED -eq 'false') {
            $packageArgs += "-SkipSttPackage"
            $packageArgs += "-SkipTtsPackage"
          }
          .\scripts\package-split-runtime.ps1 @packageArgs

      - name: Zip Hailo Addon Package
        if: env.HAILO_ASSET_CHANGED == 'true'
        shell: powershell
        run: .\scripts\package-hailo-addon.ps1

      # 4. Download Previous Release
      - name: Download Previous Release Asset
        if: env.PREVIOUS_TAG != ''
        continue-on-error: true
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $headers = @{ Authorization = "Bearer $env:GH_TOKEN"; 'User-Agent' = 'GitHubActions' }
          $release = Invoke-RestMethod -Headers $headers -Uri "https://api.github.com/repos/${{ github.repository }}/releases/tags/$env:PREVIOUS_TAG"
          $asset = $release.assets | Where-Object { $_.name -eq "python-env-full.zip" } | Select-Object -First 1

          if ($asset) {
            New-Item -ItemType Directory -Path "previous_release" -Force | Out-Null
            Invoke-WebRequest -Headers $headers -Uri $asset.browser_download_url -OutFile "previous_release\python-env-full.zip"
          }

      # 5. Generate the HDiff patch
      - name: Generate HDiff Patch
        id: diff
        shell: powershell
        run: |
          $OldFile = "previous_release\python-env-full.zip"
          $NewFile = "python-env-full.zip"
          $PatchFile = "patch.hdiff"

          if (Test-Path $OldFile) {
            Write-Host "Found previous version. Generating diff patch..."
            # [Fix] Add -s-64 to reduce memory pressure.
            ./hdiffz.exe -c-zstd -s-64 -f $OldFile $NewFile $PatchFile
          
            if (Test-Path $PatchFile) {
               $Size = (Get-Item $PatchFile).Length / 1MB
               Write-Host "Patch generated! Size: $("{0:N2}" -f $Size) MB"
               echo "PATCH_EXISTS=true" >> $env:GITHUB_ENV
            } else {
               Write-Host "Failed to generate patch."
               echo "PATCH_EXISTS=false" >> $env:GITHUB_ENV
            }
          } else {
            Write-Host "No previous version found."
            echo "PATCH_EXISTS=false" >> $env:GITHUB_ENV
          }

      # 6. Upload
      - name: Generate Runtime Artifacts
        shell: powershell
        run: .\scripts\generate-runtime-artifacts.ps1

      - name: Download Reusable Release Assets
        if: env.PREVIOUS_TAG != '' && (env.SPEECH_ASSETS_CHANGED == 'false' || env.HAILO_ASSET_CHANGED == 'false')
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $headers = @{ Authorization = "Bearer $env:GH_TOKEN"; 'User-Agent' = 'GitHubActions' }
          $release = Invoke-RestMethod -Headers $headers -Uri "https://api.github.com/repos/${{ github.repository }}/releases/tags/$env:PREVIOUS_TAG"
          $assetNames = @()

          if ($env:SPEECH_ASSETS_CHANGED -eq 'false') {
            $assetNames += @(
              "tts-hf-bert-base-uncased.zip",
              "tts-hf-bert-base-multilingual-uncased.zip",
              "tts-hf-bert-base-japanese-v3.zip",
              "tts-hf-melo-ko.zip",
              "tts-hf-melo-en.zip",
              "tts-hf-melo-ja.zip",
              "tts-hf-melo-zh.zip"
            )
          }

          if ($env:HAILO_ASSET_CHANGED -eq 'false') {
            $assetNames += "hailo-addon.zip"
          }

          foreach ($assetName in ($assetNames | Select-Object -Unique)) {
            $asset = $release.assets | Where-Object { $_.name -eq $assetName } | Select-Object -First 1
            if (-not $asset) {
              Write-Error "Missing reusable release asset '$assetName' in release $env:PREVIOUS_TAG"
              exit 1
            }
            Invoke-WebRequest -Headers $headers -Uri $asset.browser_download_url -OutFile $assetName
          }

      - name: Collect Release Artifacts
        shell: powershell
        run: |
          if (Test-Path $env:ARTIFACT_DIR) { Remove-Item $env:ARTIFACT_DIR -Recurse -Force }
          New-Item -ItemType Directory -Path $env:ARTIFACT_DIR -Force | Out-Null

          $artifactFiles = @(
            "python-env-full.zip",
            "python-engine.zip",
            "stt-assets.zip",
            "tts-core-assets.zip",
            "tts-hf-bert-base-uncased.zip",
            "tts-hf-bert-base-multilingual-uncased.zip",
            "tts-hf-bert-base-japanese-v3.zip",
            "tts-hf-melo-ko.zip",
            "tts-hf-melo-en.zip",
            "tts-hf-melo-ja.zip",
            "tts-hf-melo-zh.zip",
            "hailo-addon.zip",
            "patch.hdiff",
            "hpatchz.exe",
            "manifest.json",
            "runtime-manifest.json",
            "hash.txt"
          )

          foreach ($artifact in $artifactFiles) {
            if (Test-Path $artifact) {
              Move-Item -Path $artifact -Destination $env:ARTIFACT_DIR -Force
            }
          }

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            out/python-env-full.zip
            out/python-engine.zip
            out/stt-assets.zip
            out/tts-core-assets.zip
            out/tts-hf-bert-base-uncased.zip
            out/tts-hf-bert-base-multilingual-uncased.zip
            out/tts-hf-bert-base-japanese-v3.zip
            out/tts-hf-melo-ko.zip
            out/tts-hf-melo-en.zip
            out/tts-hf-melo-ja.zip
            out/tts-hf-melo-zh.zip
            out/hailo-addon.zip
            out/patch.hdiff
            out/hpatchz.exe
            out/manifest.json
            out/runtime-manifest.json
            out/hash.txt
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
