name: Deploy Python Environment (Diff Patch)

on:
  push:
    branches:
      - main
    tags:
      - 'env-v*'
  workflow_dispatch:

jobs:
  build-python-env:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      ARTIFACT_DIR: out

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Cache STT Asset Package
        id: cache-stt
        uses: actions/cache@v3
        with:
          path: stt-assets.zip
          key: ${{ runner.os }}-stt-assets-${{ hashFiles('runtime-models/stt/**', 'scripts/package-split-runtime.ps1', 'scripts/get-runtime-model-layout.ps1') }}

      - name: Cache Engine Package
        id: cache-engine
        uses: actions/cache@v3
        with:
          path: python-engine.zip
          key: ${{ runner.os }}-python-engine-${{ hashFiles('requirements.txt', 'libs/*.whl', 'scripts/build-python-env.ps1', 'scripts/package-split-runtime.ps1') }}

      - name: Cache TTS Asset Packages
        id: cache-tts
        uses: actions/cache@v3
        with:
          path: |
            tts-core-assets.zip
            tts-hf-*.zip
          key: ${{ runner.os }}-tts-assets-${{ hashFiles('scripts/prepare-speech-assets.ps1', 'scripts/package-split-runtime.ps1', 'scripts/get-runtime-model-layout.ps1', 'runtime-models/tts/**', 'runtime-models/speech-assets.json') }}

      - name: Cache Hailo Asset Package
        id: cache-hailo
        uses: actions/cache@v3
        with:
          path: hailo-addon.zip
          key: ${{ runner.os }}-hailo-assets-${{ hashFiles('runtime-models/hailo/**', 'scripts/package-hailo-addon.ps1', 'scripts/get-runtime-model-layout.ps1') }}

      - name: Cache Pip Packages
        uses: actions/cache@v3
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Resolve Reuse Flags
        id: reuse-flags
        shell: powershell
        run: |
          . .\scripts\get-runtime-model-layout.ps1
          $layout = Get-RuntimeModelLayout -RepoRoot (Get-Location)
          $canReuseEngine = ("${{ steps.cache-engine.outputs.cache-hit }}" -eq "true") -and (Test-Path "python-engine.zip")
          $canReuseStt = ("${{ steps.cache-stt.outputs.cache-hit }}" -eq "true") -and (Test-Path "stt-assets.zip")
          $ttsPackageFiles = Get-ExpectedTtsAssetFiles -Layout $layout
          $canReuseTts = ("${{ steps.cache-tts.outputs.cache-hit }}" -eq "true") -and (($ttsPackageFiles | Where-Object { -not (Test-Path $_) }).Count -eq 0)

          $skipBuild = $canReuseEngine -and $canReuseTts
          $skipRuntimePackage = $canReuseEngine -and $canReuseStt -and $canReuseTts

          "skip_build=$($skipBuild.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "skip_runtime_package=$($skipRuntimePackage.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      # 2. Build Python Environment
      - name: Build Pure Isolated Python
        if: steps.reuse-flags.outputs.skip_build != 'true'
        shell: powershell
        run: |
          . .\scripts\get-runtime-model-layout.ps1
          $layout = Get-RuntimeModelLayout -RepoRoot (Get-Location)
          $buildArgs = @()
          $ttsPackageFiles = Get-ExpectedTtsAssetFiles -Layout $layout
          if (("${{ steps.cache-engine.outputs.cache-hit }}" -eq "true") -and (Test-Path "python-engine.zip")) {
            $buildArgs += "-ReuseEngineZip"; $buildArgs += "python-engine.zip"
          }
          if (("${{ steps.cache-stt.outputs.cache-hit }}" -eq "true") -and (Test-Path "stt-assets.zip")) {
            $buildArgs += "-ReuseSttAssetZip"; $buildArgs += "stt-assets.zip"
          }
          if (("${{ steps.cache-tts.outputs.cache-hit }}" -eq "true") -and (($ttsPackageFiles | Where-Object { -not (Test-Path $_) }).Count -eq 0)) {
            $buildArgs += "-ReuseTtsCoreAssetZip"; $buildArgs += "tts-core-assets.zip"
          }
          .\scripts\build-python-env.ps1 @buildArgs

      # 3. Runtime Packaging
      - name: Package Split Runtime
        if: steps.reuse-flags.outputs.skip_runtime_package != 'true'
        shell: powershell
        run: |
          . .\scripts\get-runtime-model-layout.ps1
          $layout = Get-RuntimeModelLayout -RepoRoot (Get-Location)
          $packageArgs = @()
          if ("${{ steps.cache-engine.outputs.cache-hit }}" -eq "true" -and (Test-Path "python-engine.zip")) {
            $packageArgs += "-SkipEnginePackage"
          }
          if ("${{ steps.cache-stt.outputs.cache-hit }}" -eq "true" -and (Test-Path "stt-assets.zip")) {
            $packageArgs += "-SkipSttPackage"
          }
          $ttsPackageFiles = Get-ExpectedTtsAssetFiles -Layout $layout
          if ("${{ steps.cache-tts.outputs.cache-hit }}" -eq "true" -and (($ttsPackageFiles | Where-Object { -not (Test-Path $_) }).Count -eq 0)) {
            $packageArgs += "-SkipTtsPackage"
          }
          .\scripts\package-split-runtime.ps1 @packageArgs

      - name: Zip Hailo Addon Package
        if: steps.cache-hailo.outputs.cache-hit != 'true'
        shell: powershell
        run: .\scripts\package-hailo-addon.ps1

      # 4. Upload
      - name: Generate Runtime Artifacts
        if: startsWith(github.ref, 'refs/tags/env-v')
        shell: powershell
        run: .\scripts\generate-runtime-artifacts.ps1

      - name: Collect Release Artifacts
        if: startsWith(github.ref, 'refs/tags/env-v')
        shell: powershell
        run: |
          if (Test-Path $env:ARTIFACT_DIR) { Remove-Item $env:ARTIFACT_DIR -Recurse -Force }
          New-Item -ItemType Directory -Path $env:ARTIFACT_DIR -Force | Out-Null

          $artifactFiles = @(
            "python-engine.zip",
            "stt-assets.zip",
            "tts-core-assets.zip",
            "hailo-addon.zip",
            "runtime-manifest.json",
            "runtime-manifest.json.sha256",
            "hash.txt"
          )

          foreach ($artifact in $artifactFiles) {
            if (Test-Path $artifact) {
              Copy-Item -Path $artifact -Destination $env:ARTIFACT_DIR -Force
            }
          }

          Get-ChildItem -Path . -File -Filter "tts-hf-*.zip" | ForEach-Object {
            Copy-Item -Path $_.FullName -Destination $env:ARTIFACT_DIR -Force
          }

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/env-v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            out/python-engine.zip
            out/stt-assets.zip
            out/tts-core-assets.zip
            out/tts-hf-*.zip
            out/hailo-addon.zip
            out/runtime-manifest.json
            out/runtime-manifest.json.sha256
            out/hash.txt
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
