name: Deploy Python Environment (Diff Patch)

on:
  push:
    tags:
      - 'env-v*'
  workflow_dispatch:

jobs:
  build-python-env:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      ARTIFACT_DIR: out

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Cache STT Asset Package
        id: cache-stt
        uses: actions/cache@v3
        with:
          path: stt-assets.zip
          key: ${{ runner.os }}-stt-assets-${{ hashFiles('models/whisper-small-int8-ov/**', 'scripts/prepare-speech-assets.ps1', 'scripts/package-split-runtime.ps1') }}

      - name: Cache TTS Asset Packages
        id: cache-tts
        uses: actions/cache@v3
        with:
          path: |
            tts-core-assets.zip
            tts-hf-bert-base-uncased.zip
            tts-hf-bert-base-multilingual-uncased.zip
            tts-hf-bert-base-japanese-v3.zip
            tts-hf-melo-ko.zip
            tts-hf-melo-en.zip
            tts-hf-melo-ja.zip
            tts-hf-melo-zh.zip
          key: ${{ runner.os }}-tts-assets-${{ hashFiles('scripts/prepare-speech-assets.ps1', 'scripts/package-split-runtime.ps1') }}

      - name: Cache Hailo Asset Package
        id: cache-hailo
        uses: actions/cache@v3
        with:
          path: hailo-addon.zip
          key: ${{ runner.os }}-hailo-assets-${{ hashFiles('models/*.hef', 'Qwen2.5-1.5B-Instruct.hef', 'scripts/package-hailo-addon.ps1') }}

      - name: Cache Pip Packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/pip
            wheelhouse
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 2. Build Python Environment
      - name: Build Pure Isolated Python
        shell: powershell
        run: |
          $buildArgs = @()
          if (("${{ steps.cache-stt.outputs.cache-hit }}" -eq "true") -and ("${{ steps.cache-tts.outputs.cache-hit }}" -eq "true") -and (Test-Path "stt-assets.zip") -and (Test-Path "tts-core-assets.zip")) {
            $buildArgs += "-ReuseSttAssetZip"; $buildArgs += "stt-assets.zip"
            $buildArgs += "-ReuseTtsCoreAssetZip"; $buildArgs += "tts-core-assets.zip"
          }
          .\scripts\build-python-env.ps1 @buildArgs

      # 3. Runtime Packaging
      - name: Package Split Runtime
        shell: powershell
        run: |
          $packageArgs = @()
          if ("${{ steps.cache-stt.outputs.cache-hit }}" -eq "true" -and (Test-Path "stt-assets.zip")) {
            $packageArgs += "-SkipSttPackage"
          }
          if ("${{ steps.cache-tts.outputs.cache-hit }}" -eq "true" -and (Test-Path "tts-core-assets.zip")) {
            $packageArgs += "-SkipTtsPackage"
          }
          .\scripts\package-split-runtime.ps1 @packageArgs

      - name: Zip Hailo Addon Package
        if: steps.cache-hailo.outputs.cache-hit != 'true'
        shell: powershell
        run: .\scripts\package-hailo-addon.ps1

      # 4. Upload
      - name: Generate Runtime Artifacts
        shell: powershell
        run: .\scripts\generate-runtime-artifacts.ps1

      - name: Collect Release Artifacts
        shell: powershell
        run: |
          if (Test-Path $env:ARTIFACT_DIR) { Remove-Item $env:ARTIFACT_DIR -Recurse -Force }
          New-Item -ItemType Directory -Path $env:ARTIFACT_DIR -Force | Out-Null

          $artifactFiles = @(
            "python-engine.zip",
            "stt-assets.zip",
            "tts-core-assets.zip",
            "tts-hf-bert-base-uncased.zip",
            "tts-hf-bert-base-multilingual-uncased.zip",
            "tts-hf-bert-base-japanese-v3.zip",
            "tts-hf-melo-ko.zip",
            "tts-hf-melo-en.zip",
            "tts-hf-melo-ja.zip",
            "tts-hf-melo-zh.zip",
            "hailo-addon.zip",
            "runtime-manifest.json",
            "hash.txt"
          )

          foreach ($artifact in $artifactFiles) {
            if (Test-Path $artifact) {
              Move-Item -Path $artifact -Destination $env:ARTIFACT_DIR -Force
            }
          }

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            out/python-engine.zip
            out/stt-assets.zip
            out/tts-core-assets.zip
            out/tts-hf-bert-base-uncased.zip
            out/tts-hf-bert-base-multilingual-uncased.zip
            out/tts-hf-bert-base-japanese-v3.zip
            out/tts-hf-melo-ko.zip
            out/tts-hf-melo-en.zip
            out/tts-hf-melo-ja.zip
            out/tts-hf-melo-zh.zip
            out/hailo-addon.zip
            out/runtime-manifest.json
            out/hash.txt
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
